name: Dry Run Fixture

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dry-run:
    name: dry-run fixture
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run dry-run fixture
        uses: ./
        with:
          github-token: ${{ github.token }}
          dry-run: "true"
          fixture-path: test/fixtures/dry-run.json
