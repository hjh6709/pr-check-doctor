name: Dry Run Fixture

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dry-run:
    name: dry-run fixture
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run dry-run fixture
        run: npm run verify:dry-run
