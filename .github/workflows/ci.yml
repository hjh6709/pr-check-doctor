name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify local action entrypoint
        uses: ./
        with:
          github-token: ${{ github.token }}
          dry-run: "true"
          fixture-path: test/fixtures/dry-run.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Typecheck
        run: npm run build

      - name: Verify action bundle
        run: npm run verify:action

      - name: Verify dry-run fixture
        run: npm run verify:dry-run
