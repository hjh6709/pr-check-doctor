name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify local action entrypoint
        uses: ./
        with:
          github-token: ${{ github.token }}
          dry-run: "true"
          fixture-path: test/fixtures/dry-run.json

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release candidate
        run: npm run verify:release

  manual-verification-failure:
    name: manual test failure
    runs-on: ubuntu-latest

    steps:
      - name: Fail with redaction fixture
        run: |
          echo "Error: test failed password=hunter2"
          exit 1

  doctor-smoke:
    name: doctor smoke
    runs-on: ubuntu-latest
    needs:
      - test
      - manual-verification-failure
    if: ${{ always() && github.event_name == 'pull_request' }}
    permissions:
      actions: read
      checks: read
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run PR Check Doctor dry-run
        uses: ./
        with:
          github-token: ${{ github.token }}
